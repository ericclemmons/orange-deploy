packages:
  - apps/*
  - exmaples/*
  - packages/*
  - tools/*

catalog:
  "@cloudflare/kumo": ^1.12.1
  "@phosphor-icons/react": ^2.1.10
  "@tailwindcss/vite": ^4.2.1
  "@tanstack/react-router": ^1.167.0
  "@types/node": ^24
  effect: 4.0.0-beta.31
  tailwindcss: ^4.2.1
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plugin-react-click-to-component: ^4.2.0
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest

catalogMode: prefer

onlyBuiltDependencies:
  - msgpackr-extract

overrides:
  vite: "catalog:"
  vitest: "catalog:"

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
